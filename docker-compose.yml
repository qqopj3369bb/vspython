version: '3.8'

services:
  backend:
    build:
      context: ./backend       # 指定后端构建上下文
      dockerfile: Dockerfile   # 指定 Dockerfile 路径
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend      # 指定前端构建上下文
      dockerfile: Dockerfile   # 指定 Dockerfile 路径
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - BACKEND_URL=http://host.docker.internal:8000/api 
      # 注意：如果你是在同一网络内访问 backend 服务，可以用 http://backend:8000/api
      # 如果在 Windows/Mac 本地直接跑，可能需要 host.docker.internal
      # 如果用了 docker compose networking，直接用 http://backend:8000/api
    stdin_open: true         # 支持热加载
    tty: true
    depends_on:
      - backend
    
networks:
  default:
    driver: bridge
